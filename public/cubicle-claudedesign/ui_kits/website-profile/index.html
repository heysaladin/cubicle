<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bestra — Website UI Kit</title>
<link rel="stylesheet" href="site.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Cases.jsx"></script>
<script type="text/babel" src="Blog.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const saved = (typeof localStorage !== 'undefined' && localStorage.getItem('bestra-site')) || '{}';
  const init = JSON.parse(saved);
  const [dark, setDark] = useState(!!init.dark);
  const [page, setPage] = useState(init.page || 'home');
  const [sub, setSub] = useState(init.sub || null);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('bestra-site', JSON.stringify({ dark, page, sub }));
    window.scrollTo({ top: 0, behavior: 'auto' });
  }, [dark, page, sub]);

  const nav = (id) => { setPage(id); setSub(null); };
  const goSub = (id) => setSub(id);

  const label = () => {
    if (page === 'blog' && sub) return 'Blog Post';
    if (page === 'case-studies' && sub) return 'Case Study';
    if (page === 'solutions' && sub) return 'Solution Detail';
    return page;
  };

  return (
    <div data-screen-label={label()}>
      <Navbar active={page} onNav={nav} dark={dark} onToggleDark={() => setDark(!dark)} />

      {/* HOME */}
      {page === 'home' && (
        <>
          <HomeHero onCta={() => nav('solutions')} />
          <LogosRow />
          <WhyBestra />
          <HowWeHelp />
          <HomeSolutions onNav={nav} />
          <HomeBlogPreview onNav={nav} />
          <AboutBand onNav={nav} />
          <HomeTestimonials onNav={nav} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* ABOUT */}
      {page === 'about' && (
        <>
          <AboutPage onNav={nav} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* VALUES */}
      {page === 'values' && (
        <>
          <ValuesPage />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* SOLUTIONS */}
      {page === 'solutions' && !sub && (
        <>
          <SolutionsPage onDetail={goSub} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}
      {page === 'solutions' && sub && (
        <>
          <SolutionDetailPage slug={sub} onBack={() => setSub(null)} onContact={() => nav('contact')} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* TEAM */}
      {page === 'team' && (
        <>
          <TeamPage />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* PRICING */}
      {page === 'pricing' && (
        <>
          <PricingPage onCta={() => nav('contact')} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* TESTIMONIALS */}
      {page === 'testimonials' && (
        <>
          <TestimonialsPage />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* FAQ */}
      {page === 'faq' && (
        <>
          <FaqPage />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* CASE STUDIES */}
      {page === 'case-studies' && !sub && (
        <>
          <CasesPage onDetail={goSub} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}
      {page === 'case-studies' && sub && (
        <>
          <CaseDetailPage slug={sub} onBack={() => setSub(null)} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* BLOG */}
      {page === 'blog' && !sub && (
        <BlogList onOpen={goSub} />
      )}
      {page === 'blog' && sub && (
        <>
          <BlogDetail slug={sub} onBack={() => setSub(null)} />
          <CtaBand onCta={() => nav('contact')} />
        </>
      )}

      {/* CONTACT */}
      {page === 'contact' && (
        <ContactPage />
      )}

      <Footer onNav={nav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
