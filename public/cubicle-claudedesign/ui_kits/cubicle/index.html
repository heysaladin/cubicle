<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cubicle UI Kit</title>
<link rel="stylesheet" href="kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
const { useEffect } = React;

function App() {
  const saved = (typeof localStorage !== 'undefined' && localStorage.getItem('cubicle-kit')) || '{}';
  const init = JSON.parse(saved);
  const [dark, setDark]     = useState(!!init.dark);
  const [page, setPage]     = useState(init.page || 'dashboard');
  const [search, setSearch] = useState('');
  const [dialog, setDialog] = useState(false);
  const [reportName, setReportName] = useState('');

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('cubicle-kit', JSON.stringify({ dark, page }));
  }, [dark, page]);

  return (
    <div className="app">
      <Sidebar active={page} onNav={setPage} />
      <div className="main">
        <Topbar dark={dark} onToggleDark={() => setDark(!dark)} search={search} onSearch={setSearch} />
        <div className="content">
          {page === 'dashboard'  && <Dashboard onOpenDialog={() => setDialog(true)} />}
          {page === 'projects'   && <Projects />}
          {page === 'inbox'      && <Inbox />}
          {page === 'team'       && <Team />}
          {page === 'settings'   && <Settings />}
          {page === 'components' && <Components />}
        </div>
      </div>
      <Dialog
        open={dialog}
        onClose={() => setDialog(false)}
        title="New report"
        desc="Give your report a name. You can change this later."
        footer={<>
          <Button variant="outline" size="sm" onClick={() => setDialog(false)}>Cancel</Button>
          <Button variant="default" size="sm" onClick={() => { setDialog(false); setReportName(''); }}>Create</Button>
        </>}
      >
        <Label>Name</Label>
        <Input autoFocus value={reportName} onChange={e => setReportName(e.target.value)} placeholder="Weekly KPIs" />
      </Dialog>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
