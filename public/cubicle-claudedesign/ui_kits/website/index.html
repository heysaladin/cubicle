<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cubicle — Website UI Kit</title>
<link rel="stylesheet" href="site.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Blog.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const saved = (typeof localStorage !== 'undefined' && localStorage.getItem('cubicle-site')) || '{}';
  const init = JSON.parse(saved);
  const [dark, setDark] = useState(!!init.dark);
  const [page, setPage] = useState(init.page || 'home');
  const [postSlug, setPostSlug] = useState(init.postSlug || null);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('cubicle-site', JSON.stringify({ dark, page, postSlug }));
    window.scrollTo({ top: 0, behavior: 'auto' });
  }, [dark, page, postSlug]);

  const nav = (id) => { setPage(id); setPostSlug(null); };

  return (
    <div data-screen-label={page === 'blog' && postSlug ? 'Blog Post' : page}>
      <Navbar active={page} onNav={nav} dark={dark} onToggleDark={() => setDark(!dark)} />

      {page === 'home' && (
        <>
          <Hero onCta={() => nav('pricing')} />
          <LogosRow />
          <div className="container"><div className="ticks" /></div>
          <Features />
          <Testimonials />
          <CtaBand onCta={() => nav('pricing')} />
        </>
      )}

      {page === 'features' && (
        <>
          <Features />
          <Testimonials />
          <FAQ />
          <CtaBand onCta={() => nav('pricing')} />
        </>
      )}

      {page === 'pricing' && (
        <>
          <Pricing onCta={() => nav('contact')} />
          <FAQ />
        </>
      )}

      {page === 'blog' && !postSlug && (
        <BlogList onOpen={(slug) => setPostSlug(slug)} />
      )}
      {page === 'blog' && postSlug && (
        <BlogDetail slug={postSlug} onBack={() => setPostSlug(null)} />
      )}

      {page === 'contact' && (
        <ContactSection />
      )}

      <Footer onNav={nav} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
