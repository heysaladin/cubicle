<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .lbl { font: 500 14px/1 var(--font-sans); }
  .input {
    height: 40px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--neutral-200);
    background: #fff; font: 400 14px/1 var(--font-sans); color: var(--neutral-950);
    width: 100%;
  }
  .input::placeholder { color: var(--neutral-500); }
  .input:focus { outline: 2px solid var(--neutral-950); outline-offset: 2px; }
  .help { font: 400 13px/1.3 var(--font-sans); color: var(--muted-foreground); }
  .err { color: var(--red-600); }
  .cb { display: flex; align-items: center; gap: 8px; }
  .cb-box { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--neutral-400); background: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .cb-box.on { background: var(--neutral-900); border-color: var(--neutral-900); }
  .cb-box.on::after { content: ''; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translate(1px,-1px); }
  .sw { width: 36px; height: 20px; border-radius: 9999px; background: var(--neutral-200); position: relative; flex-shrink: 0; }
  .sw::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .15s; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .sw.on { background: var(--neutral-900); }
  .sw.on::after { left: 18px; }
</style>
<div class="col" style="gap:14px">
  <div class="row" style="align-items:flex-end">
    <div class="field">
      <label class="lbl">Email</label>
      <input class="input" value="saladin@cubicle.dev">
      <span class="help">We'll never share your email.</span>
    </div>
    <div class="field">
      <label class="lbl">Project</label>
      <input class="input" placeholder="untitled-project">
    </div>
  </div>
  <div class="row" style="gap:24px">
    <div class="cb"><span class="cb-box on"></span><span style="font:400 14px/1 var(--font-sans)">Accept terms</span></div>
    <div class="cb"><span class="cb-box"></span><span style="font:400 14px/1 var(--font-sans)">Subscribe to updates</span></div>
    <div class="cb"><span class="sw on"></span><span style="font:400 14px/1 var(--font-sans)">Dark mode</span></div>
    <div class="cb"><span class="sw"></span><span style="font:400 14px/1 var(--font-sans)">Telemetry</span></div>
  </div>
</div>
</body></html>
