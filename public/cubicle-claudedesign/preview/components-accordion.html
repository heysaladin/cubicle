<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  /* Accordion */
  .acc { border-radius: 8px; border: 1px solid var(--neutral-200); overflow: hidden; }
  .acc-item { border-bottom: 1px solid var(--neutral-200); }
  .acc-item:last-child { border-bottom: none; }
  .acc-trigger {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 16px; background: none; border: none; cursor: pointer;
    font: 500 14px/1 var(--font-sans); color: var(--neutral-950); text-align: left;
    transition: background .12s;
  }
  .acc-trigger:hover { background: var(--neutral-50); }
  .acc-trigger svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--neutral-500); transition: transform .2s; }
  .acc-trigger.open svg { transform: rotate(180deg); }
  .acc-content { font: 400 13px/1.6 var(--font-sans); color: var(--muted-foreground); padding: 0 16px 16px; }
  .acc-content.hidden { display: none; }
  /* Toggle */
  .tgl {
    display: inline-flex; align-items: center; justify-content: center;
    height: 36px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--neutral-200);
    background: transparent; font: 500 13px/1 var(--font-sans); color: var(--neutral-700);
    cursor: pointer; gap: 6px; transition: background .12s, color .12s;
  }
  .tgl svg { width: 15px; height: 15px; }
  .tgl:hover { background: var(--neutral-100); }
  .tgl.on { background: var(--neutral-900); color: #fff; border-color: var(--neutral-900); }
  /* Collapsible */
  .coll-trigger {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 6px; border: 1px solid var(--neutral-200);
    background: none; cursor: pointer; font: 500 14px/1 var(--font-sans); color: var(--neutral-950);
    width: 100%;
  }
  .coll-trigger svg { width: 14px; height: 14px; color: var(--neutral-500); transition: transform .2s; }
  .coll-trigger.open svg { transform: rotate(180deg); }
  .coll-content { border: 1px solid var(--neutral-200); border-top: none; border-radius: 0 0 6px 6px; padding: 12px 14px; }
  .coll-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font: 400 13px/1 var(--font-sans); color: var(--neutral-700); border-bottom: 1px solid var(--neutral-100); }
  .coll-row:last-child { border-bottom: none; padding-bottom: 0; }
  .coll-row span.dim { color: var(--neutral-400); }
</style>
<div class="col" style="gap:20px">

  <div class="acc">
    <div class="acc-item">
      <button class="acc-trigger open">
        Is it accessible?
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="acc-content">Yes. It adheres to the WAI-ARIA design pattern and is keyboard navigable.</div>
    </div>
    <div class="acc-item">
      <button class="acc-trigger">
        Is it styled?
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="acc-content hidden">Yes. It comes with default styles that matches the other components.</div>
    </div>
    <div class="acc-item">
      <button class="acc-trigger">
        Can it be animated?
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="acc-content hidden">Yes. It's animated by default, but you can disable it if you prefer.</div>
    </div>
  </div>

  <div class="row">
    <button class="tgl on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6s+2-2 5-2 5.5 2 8 2 5-2 5-2V22s-2 2-5 2-5.5-2-8-2-5 2-5 2z"/><line x1="1" y1="12" x2="21" y2="12"/></svg>
      Italic
    </button>
    <button class="tgl">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
      Bold
    </button>
    <button class="tgl">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
      Strikethrough
    </button>
  </div>

  <div style="max-width:360px">
    <button class="coll-trigger open" style="border-radius: 6px 6px 0 0">
      <span style="font:400 13px/1 var(--font-sans);color:var(--neutral-500)">3 repositories</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="coll-content">
      <div class="coll-row"><span>cubicle</span><span class="dim">React</span></div>
      <div class="coll-row"><span>cubicle-claudedesign</span><span class="dim">HTML</span></div>
      <div class="coll-row"><span>design-tokens</span><span class="dim">CSS</span></div>
    </div>
  </div>

</div>
</body></html>
