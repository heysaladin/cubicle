<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  /* Tooltip (static) */
  .tooltip-wrap { position: relative; display: inline-flex; }
  .tooltip-content {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: var(--neutral-900); color: #fff; font: 400 12px/1.2 var(--font-sans);
    padding: 6px 10px; border-radius: 6px; white-space: nowrap;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .tooltip-content::after {
    content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--neutral-900);
  }
  /* Dialog (static) */
  .dialog-backdrop { background: rgba(0,0,0,.06); border-radius: 10px; padding: 24px; display: flex; align-items: center; justify-content: center; }
  .dialog {
    background: #fff; border: 1px solid var(--neutral-200); border-radius: 10px;
    box-shadow: 0 16px 48px rgba(0,0,0,.14); width: 100%; max-width: 400px;
    padding: 24px;
  }
  .dialog-title { font: 600 16px/1.2 var(--font-sans); color: var(--neutral-950); margin-bottom: 6px; }
  .dialog-desc { font: 400 13px/1.5 var(--font-sans); color: var(--muted-foreground); margin-bottom: 20px; }
  .dialog-footer { display: flex; justify-content: flex-end; gap: 8px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 36px; padding: 0 14px; border-radius: 6px; font: 500 13px/1 var(--font-sans); cursor: pointer; transition: opacity .12s; border: 1px solid transparent; }
  .btn-default { background: var(--neutral-900); color: #fff; }
  .btn-default:hover { opacity: .88; }
  .btn-outline { background: #fff; color: var(--neutral-900); border-color: var(--neutral-200); }
  .btn-outline:hover { background: var(--neutral-50); }
  .btn-destructive { background: var(--red-600); color: #fff; }
  .btn-destructive:hover { opacity: .88; }
  /* Popover (static) */
  .popover-wrap { position: relative; display: inline-block; }
  .popover {
    position: absolute; top: calc(100% + 8px); left: 0;
    background: #fff; border: 1px solid var(--neutral-200); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.10); padding: 16px; min-width: 240px; z-index: 10;
  }
  .popover-title { font: 600 13px/1 var(--font-sans); color: var(--neutral-950); margin-bottom: 4px; }
  .popover-body { font: 400 12px/1.5 var(--font-sans); color: var(--muted-foreground); margin-bottom: 12px; }
  /* Dropdown */
  .dropdown {
    background: #fff; border: 1px solid var(--neutral-200); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.10); padding: 4px; min-width: 180px;
  }
  .dd-item {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 4px;
    font: 400 13px/1 var(--font-sans); color: var(--neutral-800); cursor: pointer;
    transition: background .1s;
  }
  .dd-item:hover { background: var(--neutral-100); }
  .dd-item.dest { color: var(--red-600); }
  .dd-item.dest:hover { background: #fff5f5; }
  .dd-item svg { width: 14px; height: 14px; color: var(--neutral-400); flex-shrink: 0; }
  .dd-item.dest svg { color: var(--red-500); }
  .dd-sep { height: 1px; background: var(--neutral-100); margin: 4px 0; }
  .dd-label { padding: 4px 10px 2px; font: 500 11px/1 var(--font-mono); color: var(--neutral-400); letter-spacing: 0.5px; text-transform: uppercase; }
</style>
<div class="col" style="gap:24px">

  <div class="row" style="gap:32px;align-items:flex-start;padding-top:28px">
    <div class="tooltip-wrap">
      <button class="btn btn-outline">Hover me</button>
      <div class="tooltip-content">Keyboard shortcut: ⌘ K</div>
    </div>
    <div class="tooltip-wrap">
      <button class="btn btn-outline" style="gap:5px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        Info
      </button>
      <div class="tooltip-content" style="left:auto;right:0;transform:none">Available on Pro plan</div>
    </div>
  </div>

  <div class="dialog-backdrop">
    <div class="dialog">
      <div class="dialog-title">Delete project</div>
      <div class="dialog-desc">This action cannot be undone. This will permanently delete <strong style="color:var(--neutral-950);font-weight:500">cubicle</strong> and remove all associated data.</div>
      <div class="dialog-footer">
        <button class="btn btn-outline">Cancel</button>
        <button class="btn btn-destructive">Delete project</button>
      </div>
    </div>
  </div>

  <div class="row" style="gap:24px;align-items:flex-start">
    <div class="popover-wrap" style="padding-bottom:140px">
      <button class="btn btn-outline">Open popover</button>
      <div class="popover">
        <div class="popover-title">Dimensions</div>
        <div class="popover-body">Set the dimensions for the layer.</div>
        <div class="row" style="gap:8px">
          <div class="col" style="gap:4px;flex:1">
            <span style="font:500 11px/1 var(--font-sans);color:var(--neutral-600)">Width</span>
            <input style="height:32px;padding:0 8px;border:1px solid var(--neutral-200);border-radius:5px;font:400 13px/1 var(--font-sans);width:100%" value="320">
          </div>
          <div class="col" style="gap:4px;flex:1">
            <span style="font:500 11px/1 var(--font-sans);color:var(--neutral-600)">Height</span>
            <input style="height:32px;padding:0 8px;border:1px solid var(--neutral-200);border-radius:5px;font:400 13px/1 var(--font-sans);width:100%" value="240">
          </div>
        </div>
        <div style="margin-top:12px;display:flex;justify-content:flex-end">
          <button class="btn btn-default" style="height:32px;font-size:12px">Apply</button>
        </div>
      </div>
    </div>
    <div class="dropdown">
      <div class="dd-label">Actions</div>
      <div class="dd-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </div>
      <div class="dd-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Duplicate
      </div>
      <div class="dd-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Export
      </div>
      <div class="dd-sep"></div>
      <div class="dd-item dest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Delete
      </div>
    </div>
  </div>

</div>
</body></html>
