<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .row-s { display: flex; align-items: end; gap: 12px; flex-wrap: wrap; }
  .block { background: var(--neutral-900); border-radius: 4px; }
  .tok { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .nm { font: 500 10px/1 var(--font-mono); color: var(--muted-foreground); }
  .px { font: 400 10px/1 var(--font-mono); color: var(--neutral-400); }
</style>
<div class="row-s">
  <div class="tok"><div class="block" style="width:2px;height:48px"></div><div class="nm">3xs</div><div class="px">2</div></div>
  <div class="tok"><div class="block" style="width:4px;height:48px"></div><div class="nm">2xs</div><div class="px">4</div></div>
  <div class="tok"><div class="block" style="width:8px;height:48px"></div><div class="nm">xs</div><div class="px">8</div></div>
  <div class="tok"><div class="block" style="width:12px;height:48px"></div><div class="nm">sm</div><div class="px">12</div></div>
  <div class="tok"><div class="block" style="width:16px;height:48px"></div><div class="nm">md</div><div class="px">16</div></div>
  <div class="tok"><div class="block" style="width:20px;height:48px"></div><div class="nm">lg</div><div class="px">20</div></div>
  <div class="tok"><div class="block" style="width:24px;height:48px"></div><div class="nm">xl</div><div class="px">24</div></div>
  <div class="tok"><div class="block" style="width:32px;height:48px"></div><div class="nm">2xl</div><div class="px">32</div></div>
  <div class="tok"><div class="block" style="width:40px;height:48px"></div><div class="nm">3xl</div><div class="px">40</div></div>
  <div class="tok"><div class="block" style="width:48px;height:48px"></div><div class="nm">4xl</div><div class="px">48</div></div>
  <div class="tok"><div class="block" style="width:64px;height:48px"></div><div class="nm">5xl</div><div class="px">64</div></div>
  <div class="tok"><div class="block" style="width:80px;height:48px"></div><div class="nm">6xl</div><div class="px">80</div></div>
</div>
</body></html>
