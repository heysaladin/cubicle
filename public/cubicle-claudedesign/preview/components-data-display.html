<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  /* Table */
  .tbl { width: 100%; border-collapse: collapse; font: 400 13px/1.4 var(--font-sans); }
  .tbl thead tr { border-bottom: 1px solid var(--neutral-200); }
  .tbl tbody tr { border-bottom: 1px solid var(--neutral-100); transition: background .1s; }
  .tbl tbody tr:last-child { border-bottom: none; }
  .tbl tbody tr:hover { background: var(--neutral-50); }
  .tbl th { padding: 10px 16px; text-align: left; font: 500 12px/1 var(--font-sans); color: var(--muted-foreground); }
  .tbl td { padding: 12px 16px; color: var(--neutral-800); }
  .tbl td.dim { color: var(--muted-foreground); }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot-green { background: var(--green-500); }
  .dot-amber { background: var(--amber-500); }
  .dot-red { background: var(--red-500); }
  /* Progress */
  .progress-track { height: 8px; width: 100%; background: var(--neutral-100); border-radius: 9999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--neutral-900); border-radius: 9999px; transition: width .3s; }
  .progress-sm { height: 4px; }
  .progress-label { display: flex; justify-content: space-between; font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); margin-bottom: 6px; }
  /* Skeleton */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skel { background: var(--neutral-100); border-radius: 6px; animation: pulse 1.8s ease-in-out infinite; }
  .skel-circle { border-radius: 50%; }
</style>
<div class="col" style="gap:24px">

  <div style="border:1px solid var(--neutral-200);border-radius:8px;overflow:hidden">
    <table class="tbl">
      <thead>
        <tr>
          <th>Project</th>
          <th>Status</th>
          <th>Updated</th>
          <th style="text-align:right">Deploys</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="font-weight:500;color:var(--neutral-950)">cubicle</td>
          <td><span class="status-dot dot-green"></span>Active</td>
          <td class="dim">2 min ago</td>
          <td style="text-align:right" class="dim">142</td>
        </tr>
        <tr>
          <td style="font-weight:500;color:var(--neutral-950)">api-gateway</td>
          <td><span class="status-dot dot-amber"></span>Building</td>
          <td class="dim">11 min ago</td>
          <td style="text-align:right" class="dim">89</td>
        </tr>
        <tr>
          <td style="font-weight:500;color:var(--neutral-950)">design-tokens</td>
          <td><span class="status-dot dot-red"></span>Failed</td>
          <td class="dim">1 hr ago</td>
          <td style="text-align:right" class="dim">34</td>
        </tr>
        <tr>
          <td style="font-weight:500;color:var(--neutral-950)">docs-site</td>
          <td><span class="status-dot dot-green"></span>Active</td>
          <td class="dim">3 hr ago</td>
          <td style="text-align:right" class="dim">207</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="col" style="gap:10px">
    <div>
      <div class="progress-label"><span>Storage</span><span>68%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:68%"></div></div>
    </div>
    <div>
      <div class="progress-label"><span>Bandwidth</span><span>34%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:34%"></div></div>
    </div>
    <div>
      <div class="progress-label"><span>Build minutes</span><span>91%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:91%;background:var(--red-600)"></div></div>
    </div>
    <div style="margin-top:4px">
      <div class="progress-track progress-sm"><div class="progress-fill" style="width:52%"></div></div>
    </div>
  </div>

  <div class="col" style="gap:12px">
    <div class="row" style="align-items:flex-start;gap:12px">
      <div class="skel skel-circle" style="width:40px;height:40px;flex-shrink:0"></div>
      <div class="col" style="gap:8px;flex:1">
        <div class="skel" style="height:14px;width:55%"></div>
        <div class="skel" style="height:12px;width:80%"></div>
        <div class="skel" style="height:12px;width:65%"></div>
      </div>
    </div>
    <div class="row" style="align-items:flex-start;gap:12px">
      <div class="skel skel-circle" style="width:40px;height:40px;flex-shrink:0"></div>
      <div class="col" style="gap:8px;flex:1">
        <div class="skel" style="height:14px;width:40%"></div>
        <div class="skel" style="height:12px;width:90%"></div>
        <div class="skel" style="height:12px;width:50%"></div>
      </div>
    </div>
  </div>

</div>
</body></html>
