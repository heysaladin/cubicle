<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  /* Breadcrumb */
  .bc { display: flex; align-items: center; gap: 6px; font: 400 13px/1 var(--font-sans); color: var(--muted-foreground); flex-wrap: wrap; }
  .bc a { color: var(--muted-foreground); text-decoration: none; transition: color .12s; }
  .bc a:hover { color: var(--neutral-950); }
  .bc .current { color: var(--neutral-950); }
  .bc .sep { color: var(--neutral-300); display: inline-flex; }
  .bc .sep svg { width: 12px; height: 12px; }
  /* Pagination */
  .pag { display: flex; align-items: center; gap: 4px; }
  .pg-btn {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 36px; height: 36px; padding: 0 8px; border-radius: 6px;
    border: 1px solid var(--neutral-200); background: #fff;
    font: 400 13px/1 var(--font-sans); color: var(--neutral-700);
    cursor: pointer; transition: background .1s, color .1s;
  }
  .pg-btn svg { width: 14px; height: 14px; }
  .pg-btn:hover { background: var(--neutral-100); }
  .pg-btn.active { background: var(--neutral-900); color: #fff; border-color: var(--neutral-900); font-weight: 500; }
  .pg-btn.dim { color: var(--neutral-300); cursor: default; border-color: var(--neutral-100); }
  .pg-ellipsis { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; font: 400 13px/1 var(--font-sans); color: var(--muted-foreground); }
  /* Nav menu */
  .nav { display: flex; align-items: center; gap: 2px; }
  .nav-item {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 6px; font: 400 13px/1 var(--font-sans);
    color: var(--neutral-600); text-decoration: none; cursor: pointer; transition: background .1s, color .1s;
    border: none; background: none;
  }
  .nav-item:hover { background: var(--neutral-100); color: var(--neutral-900); }
  .nav-item.active { color: var(--neutral-950); font-weight: 500; }
  .nav-item svg { width: 14px; height: 14px; color: var(--neutral-400); }
  .nav-item.active svg { color: var(--neutral-700); }
  /* Step indicator */
  .steps { display: flex; align-items: center; gap: 0; }
  .step { display: flex; align-items: center; gap: 0; }
  .step-circle {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font: 500 12px/1 var(--font-sans); flex-shrink: 0;
  }
  .step-circle.done { background: var(--neutral-900); color: #fff; }
  .step-circle.current { background: #fff; color: var(--neutral-950); border: 2px solid var(--neutral-900); }
  .step-circle.todo { background: var(--neutral-100); color: var(--muted-foreground); border: 1px solid var(--neutral-200); }
  .step-label { font: 400 12px/1 var(--font-sans); margin-left: 8px; color: var(--neutral-600); white-space: nowrap; }
  .step-label.current { color: var(--neutral-950); font-weight: 500; }
  .step-line { width: 32px; height: 1px; background: var(--neutral-200); margin: 0 4px; }
  .step-line.done { background: var(--neutral-900); }
</style>
<div class="col" style="gap:24px">

  <div class="col" style="gap:10px">
    <nav class="bc">
      <a href="#">Home</a>
      <span class="sep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      <a href="#">Projects</a>
      <span class="sep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      <a href="#">cubicle</a>
      <span class="sep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      <span class="current">Settings</span>
    </nav>
    <nav class="bc">
      <a href="#">
        <svg style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <span class="sep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      <a href="#">…</a>
      <span class="sep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      <a href="#">components</a>
      <span class="sep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      <span class="current">button.tsx</span>
    </nav>
  </div>

  <nav class="nav">
    <button class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Overview
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Activity
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Deployments
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      Settings
    </button>
  </nav>

  <div class="pag">
    <button class="pg-btn dim">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button class="pg-btn">1</button>
    <button class="pg-btn active">2</button>
    <button class="pg-btn">3</button>
    <span class="pg-ellipsis">…</span>
    <button class="pg-btn">8</button>
    <button class="pg-btn">9</button>
    <button class="pg-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-circle done">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="step-label">Account</span>
    </div>
    <div class="step-line done"></div>
    <div class="step">
      <div class="step-circle done">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="step-label">Project</span>
    </div>
    <div class="step-line done"></div>
    <div class="step">
      <div class="step-circle current">3</div>
      <span class="step-label current">Deploy</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle todo">4</div>
      <span class="step-label">Review</span>
    </div>
  </div>

</div>
</body></html>
