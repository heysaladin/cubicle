<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .logo-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tile { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 10px; min-height: 120px; }
  .tile.dark { background: #000; color: #fff; border-color: #171717; }
  .wordmark { font: 700 32px/1 var(--font-sans); letter-spacing: -1.2px; }
  .dot { width: 12px; height: 12px; border-radius: 3px; background: currentColor; display: inline-block; margin-right: 8px; vertical-align: baseline; transform: translateY(-2px); }
  .caption { font: 500 11px/1 var(--font-mono); color: var(--muted-foreground); letter-spacing: 0.5px; text-transform: uppercase; }
  .tile.dark .caption { color: var(--neutral-400); }
</style>
<div class="logo-wrap">
  <div class="tile">
    <div class="caption">Wordmark — light</div>
    <div class="wordmark"><span class="dot"></span>cubicle</div>
  </div>
  <div class="tile dark">
    <div class="caption">Wordmark — dark</div>
    <div class="wordmark"><span class="dot"></span>cubicle</div>
  </div>
</div>
</body></html>
