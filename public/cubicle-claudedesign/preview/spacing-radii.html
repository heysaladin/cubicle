<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .row-r { display: flex; gap: 14px; align-items: end; flex-wrap: wrap; }
  .r { width: 64px; height: 64px; background: var(--neutral-100); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font: 500 10px/1 var(--font-mono); color: var(--muted-foreground); }
  .tok { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .nm { font: 500 10px/1 var(--font-mono); color: var(--muted-foreground); }
</style>
<div class="row-r">
  <div class="tok"><div class="r" style="border-radius:0">0</div><div class="nm">none</div></div>
  <div class="tok"><div class="r" style="border-radius:2px">2</div><div class="nm">xs</div></div>
  <div class="tok"><div class="r" style="border-radius:4px">4</div><div class="nm">sm</div></div>
  <div class="tok"><div class="r" style="border-radius:6px">6</div><div class="nm">md</div></div>
  <div class="tok"><div class="r" style="border-radius:8px">8</div><div class="nm">lg</div></div>
  <div class="tok"><div class="r" style="border-radius:10px">10</div><div class="nm">DEFAULT</div></div>
  <div class="tok"><div class="r" style="border-radius:12px">12</div><div class="nm">xl</div></div>
  <div class="tok"><div class="r" style="border-radius:16px">16</div><div class="nm">2xl</div></div>
  <div class="tok"><div class="r" style="border-radius:24px">24</div><div class="nm">3xl</div></div>
  <div class="tok"><div class="r" style="border-radius:9999px">∞</div><div class="nm">full</div></div>
</div>
</body></html>
