<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    white-space: nowrap; border-radius: 6px; font: 500 14px/1 var(--font-sans);
    height: 40px; padding: 0 16px; border: 1px solid transparent;
    transition: background-color .15s, opacity .15s, box-shadow .15s;
    cursor: pointer;
  }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .btn-default { background: var(--neutral-900); color: var(--neutral-50); }
  .btn-default:hover { background: #171717e6; }
  .btn-secondary { background: var(--neutral-100); color: var(--neutral-900); }
  .btn-secondary:hover { background: #f5f5f5cc; }
  .btn-outline { background: #fff; color: var(--neutral-900); border-color: var(--neutral-200); }
  .btn-outline:hover { background: var(--neutral-100); }
  .btn-ghost { background: transparent; color: var(--neutral-900); }
  .btn-ghost:hover { background: var(--neutral-100); }
  .btn-destructive { background: var(--red-600); color: #fff; }
  .btn-destructive:hover { background: #fa5252e6; }
  .btn-link { background: transparent; color: var(--neutral-900); text-decoration-color: transparent; text-underline-offset: 4px; padding: 0; height: auto; }
  .btn-link:hover { text-decoration: underline; }
  .btn-sm { height: 36px; padding: 0 12px; font-size: 13px; }
  .btn-lg { height: 44px; padding: 0 32px; }
  .btn-icon { width: 40px; padding: 0; }
</style>
<div class="col" style="gap:14px">
  <div class="row">
    <button class="btn btn-default">Default</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-outline">Outline</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-destructive">Delete</button>
    <button class="btn btn-link">Link</button>
  </div>
  <div class="row">
    <button class="btn btn-default btn-sm">Small</button>
    <button class="btn btn-default">Default</button>
    <button class="btn btn-default btn-lg">Large</button>
    <button class="btn btn-outline btn-icon" aria-label="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="btn btn-default" disabled style="opacity:.5;pointer-events:none">Disabled</button>
  </div>
</div>
</body></html>
