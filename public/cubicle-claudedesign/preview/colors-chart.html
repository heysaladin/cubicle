<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .c { display: flex; flex-direction: column; gap: 6px; }
  .bar { height: 48px; border-radius: 6px; border: 1px solid var(--black-a-5); }
  .n { font: 500 11px/1 var(--font-mono); color: var(--muted-foreground); display: flex; justify-content: space-between; }
  h4 { margin: 0 0 4px; font: 600 12px/1 var(--font-sans); letter-spacing: -0.1px; }
</style>
<div class="col" style="gap:14px">
  <div>
    <h4>Chart — Light</h4>
    <div class="wrap">
      <div class="c"><div class="bar" style="background:#F54A00"></div><div class="n"><span>chart-1</span><span>#F54A00</span></div></div>
      <div class="c"><div class="bar" style="background:#009689"></div><div class="n"><span>chart-2</span><span>#009689</span></div></div>
      <div class="c"><div class="bar" style="background:#104E64"></div><div class="n"><span>chart-3</span><span>#104E64</span></div></div>
      <div class="c"><div class="bar" style="background:#FFB900"></div><div class="n"><span>chart-4</span><span>#FFB900</span></div></div>
      <div class="c"><div class="bar" style="background:#FE9A00"></div><div class="n"><span>chart-5</span><span>#FE9A00</span></div></div>
      <div class="c"><div class="bar" style="background:#FA5252"></div><div class="n"><span>destructive</span><span>#FA5252</span></div></div>
    </div>
  </div>
  <div>
    <h4>Chart — Dark</h4>
    <div class="wrap">
      <div class="c"><div class="bar" style="background:#1447E6"></div><div class="n"><span>chart-1</span><span>#1447E6</span></div></div>
      <div class="c"><div class="bar" style="background:#00BC7D"></div><div class="n"><span>chart-2</span><span>#00BC7D</span></div></div>
      <div class="c"><div class="bar" style="background:#FD9A00"></div><div class="n"><span>chart-3</span><span>#FD9A00</span></div></div>
      <div class="c"><div class="bar" style="background:#AD46FF"></div><div class="n"><span>chart-4</span><span>#AD46FF</span></div></div>
      <div class="c"><div class="bar" style="background:#FF2056"></div><div class="n"><span>chart-5</span><span>#FF2056</span></div></div>
      <div class="c"><div class="bar" style="background:#FF6B6B"></div><div class="n"><span>destructive</span><span>#FF6B6B</span></div></div>
    </div>
  </div>
</div>
</body></html>
