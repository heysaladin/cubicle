<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
  .alert { display: flex; gap: 12px; padding: 16px; border-radius: 8px; border: 1px solid var(--neutral-200); background: #fff; align-items: flex-start; }
  .alert.err { border-color: var(--red-600); color: var(--red-700); }
  .alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
  .alert .t { font: 500 14px/1.2 var(--font-sans); margin-bottom: 4px; }
  .alert .d { font: 400 13px/1.4 var(--font-sans); color: var(--muted-foreground); }
  .alert.err .d { color: var(--red-600); }
  .sep { height: 1px; background: var(--border); }
  .sep-v { width: 1px; background: var(--border); align-self: stretch; }
</style>
<div class="col" style="gap:12px">
  <div class="alert">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <div>
      <div class="t">Heads up</div>
      <div class="d">You can add components to your app using the CLI.</div>
    </div>
  </div>
  <div class="alert err">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
    <div>
      <div class="t">Your session expired</div>
      <div class="d">Please log in again to continue.</div>
    </div>
  </div>
  <div class="row" style="font:400 13px/1 var(--font-sans);color:var(--muted-foreground);gap:12px">
    <span>Docs</span><span class="sep-v"></span><span>Changelog</span><span class="sep-v"></span><span>GitHub</span>
  </div>
</div>
</body></html>
